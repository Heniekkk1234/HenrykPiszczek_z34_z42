<body>
<div style="color:red;font-size:40px;">
<script language="JavaScript">
var x=prompt("podaj liczbe ","");
var a_pis=parseFloat(x);
document.write("Podana liczba to "+a_pis+"<br>");
if(a_pis%2==0){
document.write ("<p style=\"font-size: 3cm; color: red;\"> Liczba jest parzysta <br> </p>");
}
else{
document.write ("<p style=\"font-size: 5cm; color: silver;\"> Liczba jest nieparzysta <br> </p>");
}
</script>
</div>
</body>
