 <script>
 function fun_pis() {
 var x_pis = prompt("Podaj kolor", "");
 if(x_pis == 1 || x_pis.toLowerCase() == "czerwony") {
document.write('<h1 style="color:red;">wczytałeś kolor czerwony</h1><br />'); }
 else if(x_pis == 2 || x_pis.toLowerCase() == "niebieski") {
document.write('<h1 style="color:blue;">wczytałeś kolor niebieski</h1><br />');
}
}
</script>
