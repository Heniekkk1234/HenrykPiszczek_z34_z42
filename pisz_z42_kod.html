<script>
function opc_pis() {
 var x_pis = prompt("Podaj opcje", "");

if((x_pis!=6) && (x_pis!=28) && (x_pis!=79))
{
 document.write("<font color=red size=7> nie ma takiej opcji</font>"+"<br>");
}

if(x_pis==6)
{

}

{
